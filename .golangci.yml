version: "2"

linters:
  default: all
  disable:
    - depguard
    - exhaustruct
    - gochecknoglobals
    - gochecknoinits
    - nilnil
    - wsl
  enable:
    - modernfor
    - useany
  settings:
    custom:
      modernfor:
        type: module
        description: Enforces Go 1.22 range over int
      useany:
        type: module
        description: Enforces using 'any' instead of 'interface{}'
