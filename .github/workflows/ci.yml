name: Lint

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4

      # Use local checkout as plugin source instead of published version
      - run: sed -i 's|^\(\s\+\)version:.*|\1path:\ '"$GITHUB_WORKSPACE"'|' .custom-gcl.yml

      - run: golangci-lint custom

      - run: ./custom-gcl run ./...
